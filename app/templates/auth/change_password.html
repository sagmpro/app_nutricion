<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar contraseña — NutriPlan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['system-ui', 'sans-serif'] } } }
    }
  </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-green-600 mb-4 shadow-lg">
      <span class="text-3xl">🔑</span>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">NutriPlan</h1>
    <p class="text-gray-500 text-sm mt-1">Cambiar contraseña</p>
  </div>

  <div class="bg-white rounded-2xl shadow border border-gray-200 p-8">
    <h2 class="text-lg font-semibold text-gray-800 mb-6">Nueva contraseña</h2>

    {% if error %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">
      {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="mb-4 p-3 bg-green-50 border border-green-200 rounded-xl text-green-700 text-sm">
      {{ success }}
    </div>
    {% endif %}

    <form method="POST" action="/cambiar-contrasena">
      <div class="mb-4">
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1.5">
          Correo electrónico
        </label>
        <input type="email" name="email" value="{{ email or '' }}" required autocomplete="email"
               class="block w-full rounded-xl px-4 py-3 text-sm bg-gray-50 border border-gray-300 outline-none transition-all focus:border-transparent focus:ring-2 focus:ring-green-500 focus:bg-white"
               placeholder="tu@email.com">
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1.5">
          Contraseña actual
        </label>
        <div class="relative">
          <input type="password" name="current_password" id="current_password" required
                 class="block w-full rounded-xl px-4 py-3 pr-11 text-sm bg-gray-50 border border-gray-300 outline-none transition-all focus:border-transparent focus:ring-2 focus:ring-green-500 focus:bg-white"
                 placeholder="Tu contraseña actual">
          <button type="button" onclick="togglePwd('current_password', 'eye1')" tabindex="-1"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <svg id="eye1" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1.5">
          Nueva contraseña
        </label>
        <div class="relative">
          <input type="password" name="new_password" id="new_password" required minlength="8"
                 class="block w-full rounded-xl px-4 py-3 pr-11 text-sm bg-gray-50 border border-gray-300 outline-none transition-all focus:border-transparent focus:ring-2 focus:ring-green-500 focus:bg-white"
                 placeholder="Mínimo 8 caracteres">
          <button type="button" onclick="togglePwd('new_password', 'eye2')" tabindex="-1"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <svg id="eye2" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="mb-6">
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1.5">
          Confirmar nueva contraseña
        </label>
        <div class="relative">
          <input type="password" name="confirm_password" id="confirm_password" required
                 class="block w-full rounded-xl px-4 py-3 pr-11 text-sm bg-gray-50 border border-gray-300 outline-none transition-all focus:border-transparent focus:ring-2 focus:ring-green-500 focus:bg-white"
                 placeholder="Repite la nueva contraseña">
          <button type="button" onclick="togglePwd('confirm_password', 'eye3')" tabindex="-1"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <svg id="eye3" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit"
              class="w-full bg-green-600 hover:bg-green-700 active:bg-green-800 text-white font-semibold py-3 rounded-xl transition-all shadow-sm text-sm">
        Cambiar contraseña
      </button>
    </form>
  </div>

  <div class="mt-4 text-center">
    <a href="/login" class="text-sm text-gray-500 hover:text-gray-700">
      ← Volver al inicio de sesión
    </a>
  </div>
</div>

<script>
function togglePwd(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
  }
}
</script>
</body>
</html>
